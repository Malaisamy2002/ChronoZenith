<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#000"/>
<title>Chrono · Zenith</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@200;300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════════════════
   CHRONO · ZENITH  —  Android Enhanced Edition
   Bug-fixed · Sound engine · Enhanced visuals · Android WebView ready
═══════════════════════════════════════════════════════════════════ */
:root{
  --void:#000;
  --d0:#000000;--d1:#030303;--d2:#050505;--d3:#080808;
  --d4:#0d0d0d;--d5:#131313;--d6:#1a1a1a;--d7:#232323;--d8:#303030;
  --b0:#080808;--b1:#141414;--b2:#202020;--b3:#2e2e2e;
  --i0:#eeeeee;--i1:#a5a5a5;--i2:#555555;--i3:#2c2c2c;
  --accent:#fff;

  --eS: cubic-bezier(0.16,1,0.3,1);
  --eE: cubic-bezier(0.19,1,0.22,1);
  --eSp:cubic-bezier(0.175,0.885,0.32,1.275);
  --eBo:cubic-bezier(0.34,1.56,0.64,1);
  --eSm:cubic-bezier(0.37,0,0.63,1);
  --eBk:cubic-bezier(0.68,-0.55,0.27,1.55);
  --eLq:cubic-bezier(0.25,0.46,0.45,0.94);
  --eIn:cubic-bezier(0.55,0,1,0.45);
  --eOv:cubic-bezier(0.34,1.3,0.64,1);

  --rXL:40px;--rLG:26px;--rMD:15px;--rSM:10px;--rF:999px;
  --srf:'Instrument Serif',Georgia,serif;
  --mono:'DM Mono','Courier New',monospace;
  --sans:'Syne',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:#000}
body{font-family:var(--mono);background:var(--d0);color:var(--i0);min-height:100dvh;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  user-select:none;cursor:default;/* Android: keep default cursor */
  -webkit-tap-highlight-color:transparent;touch-action:pan-y;}

/* ── Android status bar safe area ── */
#APP{padding-top:env(safe-area-inset-top,0px);}

/* ═══════════════════════════════════════════════════════════════════
   CURSOR — hide on touch devices (Android)
═══════════════════════════════════════════════════════════════════ */
.CL{position:fixed;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;}
#CD{z-index:9999;width:5px;height:5px;background:var(--i0);mix-blend-mode:difference;
  transition:width .2s var(--eS),height .2s var(--eS),opacity .15s;}
#CR1{z-index:9998;width:20px;height:20px;border:1px solid rgba(255,255,255,.28);
  transition:width .35s var(--eS),height .35s var(--eS),border-color .3s,opacity .22s;}
#CR2{z-index:9997;width:38px;height:38px;border:1px solid rgba(255,255,255,.09);
  transition:width .6s var(--eS),height .6s var(--eS),border-color .45s,opacity .4s;}
#CR3{z-index:9996;width:62px;height:62px;border:1px solid rgba(255,255,255,.035);
  transition:width .95s var(--eS),height .95s var(--eS),opacity .8s;}
#CR4{z-index:9995;width:92px;height:92px;border:1px solid rgba(255,255,255,.014);
  transition:width 1.45s var(--eS),height 1.45s var(--eS),opacity 1.15s;}
body.COV #CD{width:2px;height:2px;opacity:.3}
body.COV #CR1{width:46px;height:46px;border-color:rgba(255,255,255,.055)}
body.COV #CR2{width:66px;height:66px;border-color:rgba(255,255,255,.028)}
body.COV #CR3{width:94px;height:94px;opacity:.55}
body.COV #CR4{width:132px;height:132px;opacity:.38}
body.CDR #CD{opacity:.1}
body.CDR #CR1{width:24px;height:24px;opacity:.3}
body.CDR #CR2{width:36px;height:36px;opacity:.16}
body.CDR #CR3{opacity:.07}body.CDR #CR4{opacity:.03}
/* Always hide cursor on touch/mobile */
@media(pointer:coarse){.CL{display:none!important}body{cursor:default}}

/* ═══════════════════════════════════════════════════════════════════
   ATMOSPHERE
═══════════════════════════════════════════════════════════════════ */
#CNS{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.6;}
#GRN{position:fixed;inset:0;z-index:9991;pointer-events:none;opacity:.016;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 480 480' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:190px 190px;animation:grn .16s steps(1) infinite;}
@keyframes grn{
  0%{background-position:0 0}16%{background-position:-52px 30px}
  33%{background-position:40px -24px}50%{background-position:-22px 48px}
  66%{background-position:34px -38px}83%{background-position:-46px 18px}}
#VIG{position:fixed;inset:0;z-index:9990;pointer-events:none;
  background:radial-gradient(ellipse 100% 100% at 50% 50%,
    transparent 35%,rgba(0,0,0,.14) 58%,rgba(0,0,0,.46) 78%,rgba(0,0,0,.82) 100%);}

/* ── Touch ripple flash overlay (new — Android feedback) ── */
#TFB{position:fixed;inset:0;z-index:9994;pointer-events:none;
  background:radial-gradient(circle at var(--tx,50%) var(--ty,50%),rgba(255,255,255,.09) 0%,transparent 60%);
  opacity:0;transition:opacity .18s;}
#TFB.ON{opacity:1;transition:opacity 0s;}

/* ═══════════════════════════════════════════════════════════════════
   APP SHELL & VIEW SYSTEM
═══════════════════════════════════════════════════════════════════ */
#APP{position:relative;min-height:100dvh;overflow:hidden;
  perspective:1600px;transform-style:preserve-3d;}
.V{position:absolute;inset:0;will-change:transform,opacity,filter;
  backface-visibility:hidden;transform-style:preserve-3d;}
.V.OFF{display:none!important}

#PV.VX{animation:pvOut .72s var(--eE) forwards}
#PV.VE{animation:pvIn  .72s var(--eE) forwards}
@keyframes pvOut{
  0%  {opacity:1;transform:scale(1) translateY(0) rotateX(0deg) skewY(0deg); filter:blur(0) saturate(1)}
  25% {opacity:.75;transform:scale(.975) translateY(-1.5vh) rotateX(1.8deg) skewY(.15deg);filter:blur(1.5px) saturate(.9)}
  100%{opacity:0;transform:scale(.91) translateY(-7vh) rotateX(5deg) skewY(0deg); filter:blur(12px) saturate(.55)}}
@keyframes pvIn{
  0%  {opacity:0;transform:scale(.91) translateY(7vh) rotateX(-5deg) skewY(0deg); filter:blur(12px) saturate(.55)}
  55% {opacity:.92;transform:scale(.995) translateY(.4vh) rotateX(-.4deg); filter:blur(.4px) saturate(.98)}
  100%{opacity:1;transform:scale(1) translateY(0) rotateX(0deg); filter:blur(0) saturate(1)}}
#LV.VX{animation:lvOut .66s var(--eE) forwards}
#LV.VE{animation:lvIn  .66s var(--eE) forwards}
@keyframes lvOut{
  0%  {opacity:1;transform:scale(1) translateX(0) rotateY(0deg);filter:blur(0)}
  100%{opacity:0;transform:scale(.9) translateX(7vw) rotateY(-5deg);filter:blur(13px)}}
@keyframes lvIn{
  0%  {opacity:0;transform:scale(.9) translateX(-7vw) rotateY(5deg);filter:blur(13px)}
  58% {opacity:.94;transform:scale(.996) translateX(-.25vw);filter:blur(.3px)}
  100%{opacity:1;transform:scale(1) translateX(0) rotateY(0deg);filter:blur(0)}}

@keyframes reveal{
  from{opacity:0;transform:translateY(36px) scale(.965);filter:blur(9px) saturate(.6)}
  to  {opacity:1;transform:translateY(0) scale(1);filter:blur(0) saturate(1)}}
.RV{animation:reveal 1.1s var(--eS) both}
.R1{animation-delay:.03s}.R2{animation-delay:.14s}
.R3{animation-delay:.27s}.R4{animation-delay:.43s}.R5{animation-delay:.62s}

/* ═══════════════════════════════════════════════════════════════════
   PORTRAIT VIEW
═══════════════════════════════════════════════════════════════════ */
#PV{
  display:flex;flex-direction:column;align-items:center;overflow-y:auto;
  min-height:100dvh;position:relative;z-index:2;
  padding-top:max(env(safe-area-inset-top,0px),18px);
  padding-bottom:max(env(safe-area-inset-bottom,0px),36px);
  background:linear-gradient(180deg,var(--d0) 0%,var(--void) 100%);
  background-image:
    radial-gradient(ellipse 72% 42% at 50% -6%,rgba(255,255,255,.028) 0%,transparent 65%),
    radial-gradient(ellipse 120% 52% at 50% 112%,rgba(0,0,0,.7) 0%,transparent 58%);}

.HDR{display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 22px;}
.BRD{display:flex;align-items:center;gap:11px;}
.BG{width:27px;height:27px;border-radius:9px;border:1px solid var(--b2);background:var(--d3);
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  transition:transform .45s var(--eSp),border-color .4s,box-shadow .55s var(--eS);}
.BG::before{content:'';position:absolute;inset:0;
  background:linear-gradient(145deg,rgba(255,255,255,.09) 0%,transparent 50%);}
.BG:hover{transform:scale(1.22) rotate(12deg);border-color:var(--b3);
  box-shadow:0 0 18px rgba(255,255,255,.09),0 6px 16px rgba(0,0,0,.65);}
.BO{position:absolute;border-radius:50%;border:1px solid;}
.BO:nth-child(1){width:6px;height:6px;border-color:rgba(255,255,255,.14);animation:OP 3.6s ease-in-out infinite 0s;}
.BO:nth-child(2){width:12px;height:12px;border-color:rgba(255,255,255,.065);animation:OP 3.6s ease-in-out infinite .55s;}
.BO:nth-child(3){width:20px;height:20px;border-color:rgba(255,255,255,.028);animation:OP 3.6s ease-in-out infinite 1.1s;}
@keyframes OP{0%,100%{transform:scale(.6);opacity:0}50%{transform:scale(1);opacity:1}}
.BC{position:absolute;width:3.5px;height:3.5px;border-radius:50%;background:var(--i2);z-index:1;
  animation:CP 3.6s ease-in-out infinite;}
@keyframes CP{0%,100%{transform:scale(1);opacity:.38}50%{transform:scale(2.1);opacity:1}}
.BN{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--i2);text-transform:uppercase;}

.LP{font-family:var(--mono);font-size:11px;font-weight:300;color:var(--i2);
  background:var(--d3);border:1px solid var(--b1);border-radius:var(--rF);
  padding:5px 16px;letter-spacing:.07em;position:relative;overflow:hidden;
  transition:color .4s,background .4s,border-color .4s;}
.LP::before{content:'';position:absolute;inset:-120%;
  background:conic-gradient(from 0deg,transparent 0%,rgba(255,255,255,.06) 10%,rgba(255,255,255,.025) 16%,transparent 28%);
  animation:SH 7s linear infinite;}
@keyframes SH{to{transform:rotate(360deg)}}
.LP::after{content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.04) 50%,transparent 70%);
  transform:translateX(-100%);animation:SW 4s ease-in-out infinite 2s;}
@keyframes SW{0%{transform:translateX(-100%)}40%,100%{transform:translateX(150%)}}

.PSH{width:100%;overflow:hidden;padding-top:30px;position:relative;}
.PSH::before,.PSH::after{content:'';position:absolute;top:0;bottom:0;width:40px;z-index:3;pointer-events:none;}
.PSH::before{left:0;background:linear-gradient(90deg,var(--d0) 0%,transparent 100%)}
.PSH::after{right:0;background:linear-gradient(-90deg,var(--d0) 0%,transparent 100%)}
.PBL{display:flex;align-items:center;padding:12px 26px;gap:16px;will-change:transform;}

.CC{flex:0 0 calc(100vw - 52px);aspect-ratio:1;border-radius:var(--rXL);overflow:hidden;
  display:flex;align-items:center;justify-content:center;position:relative;
  will-change:transform,opacity,box-shadow;
  transition:transform .8s var(--eSp),opacity .48s var(--eS),box-shadow .75s var(--eS),border-color .65s;}
.CC::before{content:'';position:absolute;inset:0;border-radius:inherit;z-index:2;pointer-events:none;
  background:linear-gradient(155deg,rgba(255,255,255,.05) 0%,transparent 38%,rgba(255,255,255,.014) 68%,transparent 100%);
  transition:opacity .5s;}
.CC::after{content:'';position:absolute;inset:0;border-radius:inherit;z-index:2;pointer-events:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 0 rgba(0,0,0,.65),
    inset 1px 0 0 rgba(255,255,255,.03),inset -1px 0 0 rgba(0,0,0,.35);}
.CC.CI{transform:scale(.81);opacity:.14;box-shadow:none;border:1px solid var(--b0);}
.CC.CI::before{opacity:.25}
.CC.CA{transform:scale(1);opacity:1;border:1px solid var(--b1);
  box-shadow:0 0 0 1px rgba(255,255,255,.025),inset 0 1px 0 rgba(255,255,255,.06),
    0 4px 10px rgba(0,0,0,.55),0 18px 55px rgba(0,0,0,.85),
    0 55px 140px rgba(0,0,0,1),0 0 160px rgba(255,255,255,.006);}
.CC canvas{display:block;width:82%!important;height:82%!important;position:relative;z-index:1;
  transition:filter .55s var(--eS),opacity .45s var(--eS);}
.CC.CI canvas{filter:brightness(.45) blur(1.5px);opacity:.7}
.CC.CA canvas{filter:brightness(1) blur(0);opacity:1}

.DR{display:flex;gap:5px;align-items:center;margin-top:26px;}
.ID{border-radius:var(--rF);background:var(--d7);
  transition:width .65s var(--eBo),height .42s var(--eS),background .35s,opacity .35s,box-shadow .42s;}
.ID.DO{width:30px;height:3px;opacity:1;background:rgba(255,255,255,.52);
  box-shadow:0 0 14px rgba(255,255,255,.24),0 0 28px rgba(255,255,255,.09);}
.ID.DF{width:4px;height:3px;opacity:.22}

.FLW{height:56px;overflow:hidden;position:relative;width:100%;display:flex;justify-content:center;margin-top:20px;}
.FL{position:absolute;display:flex;flex-direction:column;align-items:center;gap:5px;inset:0;
  transition:opacity .28s var(--eS),transform .36s var(--eS),filter .28s;}
.FL.FLS{opacity:1;transform:translateY(0);filter:blur(0)}
.FL.FLU{opacity:0;transform:translateY(-20px);filter:blur(5px)}
.FL.FLD{opacity:0;transform:translateY(20px);filter:blur(5px)}
.FT{font-family:var(--sans);font-size:19px;font-weight:700;color:var(--i0);letter-spacing:.02em;}
.FS{font-family:var(--mono);font-size:10px;font-weight:200;color:var(--i2);letter-spacing:.055em;}

/* ═══════════════════════════════════════════════════════════════════
   TIMER CARD
═══════════════════════════════════════════════════════════════════ */
.TSH{width:calc(100% - 28px);margin:28px 14px 22px;position:relative;}
.TSH::before{content:'';position:absolute;inset:-1px;z-index:0;
  border-radius:calc(var(--rXL)+1px);
  background:linear-gradient(150deg,rgba(255,255,255,.07) 0%,transparent 40%,rgba(255,255,255,.025) 100%);
  pointer-events:none;transition:opacity .65s var(--eS),filter .65s var(--eS);}
.TSH::after{content:'';position:absolute;inset:-6px;z-index:-1;border-radius:calc(var(--rXL)+6px);
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,255,255,.04) 0%,transparent 70%);
  pointer-events:none;opacity:0;transition:opacity .65s var(--eS);}
.TSH.RUN::before{animation:AUR 3.4s ease-in-out infinite alternate;}
.TSH.RUN::after{opacity:1;animation:AUR2 3.4s ease-in-out infinite alternate;}
@keyframes AUR{from{opacity:.65}to{opacity:1.45}}
@keyframes AUR2{from{opacity:.4;filter:blur(8px)}to{opacity:1;filter:blur(16px)}}

.TC{position:relative;z-index:1;border-radius:var(--rXL);
  padding:24px 22px 22px;overflow:hidden;
  background:linear-gradient(165deg,var(--d2) 0%,var(--d1) 52%,#020202 100%);
  border:1px solid var(--b1);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),inset 0 -1px 0 rgba(0,0,0,.6),
    0 4px 10px rgba(0,0,0,.6),0 16px 48px rgba(0,0,0,.7),0 60px 160px rgba(0,0,0,.9);}
.TC::before{content:'';position:absolute;top:0;left:5%;right:5%;height:1px;z-index:1;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.14) 50%,transparent);pointer-events:none;}
.TC::after{content:'';position:absolute;inset:0;z-index:3;border-radius:inherit;pointer-events:none;
  background:linear-gradient(105deg,transparent 20%,rgba(255,255,255,.045) 50%,transparent 80%);
  transform:translateX(-110%);opacity:0;}
.TC.SWEEP::after{opacity:1;animation:CSW .65s var(--eS) forwards;}
@keyframes CSW{from{transform:translateX(-110%)}to{transform:translateX(110%)}}

.TH{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;position:relative;z-index:2;}
.TL{font-family:var(--sans);font-size:8px;font-weight:700;letter-spacing:.26em;color:var(--i3);text-transform:uppercase;}

.SR{display:flex;gap:7px;align-items:center}
.SP{width:5px;height:5px;border-radius:50%;background:var(--d7);opacity:.28;
  transition:background .6s var(--eS),transform .48s var(--eSp),box-shadow .6s,opacity .42s;}
.SP.SON{background:var(--i0);transform:scale(1.5);opacity:1;
  box-shadow:0 0 12px rgba(255,255,255,.35),0 0 28px rgba(255,255,255,.15);}
.SP.POP{animation:PIP .58s var(--eBo) both;}
@keyframes PIP{0%{transform:scale(1.5)}38%{transform:scale(2.4)}72%{transform:scale(1.15)}100%{transform:scale(1.5)}}

.PB{display:flex;gap:2px;background:var(--d1);border:1px solid var(--b0);
  border-radius:var(--rMD);padding:3px;margin-bottom:26px;position:relative;z-index:2;overflow:hidden;}
.PB::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.028) 0%,transparent 48%);}
.PSL{position:absolute;top:3px;bottom:3px;border-radius:calc(var(--rMD)-2px);
  background:linear-gradient(170deg,var(--d8) 0%,var(--d6) 100%);
  border:1px solid var(--b2);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.09),0 3px 16px rgba(0,0,0,.75),0 1px 6px rgba(0,0,0,.55);
  transition:left .48s var(--eLq),width .48s var(--eLq);pointer-events:none;}
.PHB{flex:1;padding:11px 4px;border-radius:calc(var(--rMD)-3px);
  border:none;background:transparent;font-family:var(--mono);
  font-size:10px;color:var(--i3);cursor:pointer;
  transition:color .38s var(--eS),transform .3s var(--eSp);
  letter-spacing:.055em;position:relative;z-index:1;-webkit-tap-highlight-color:transparent;}
.PHB.PON{color:var(--i0);font-weight:500;letter-spacing:.04em;}
.PHB:active{transform:scale(.84)}

/* ═══════════════════════════════════════════════════════════════════
   PROGRESS RING
═══════════════════════════════════════════════════════════════════ */
.RZ{display:flex;justify-content:center;margin-bottom:24px;position:relative;z-index:2;}
#RC{position:absolute;inset:0;z-index:0;pointer-events:none;}
.RSV{position:relative;z-index:1;display:block;overflow:visible;}
.RB{fill:none;stroke:var(--d4);stroke-width:4}
.RHA{fill:none;stroke:rgba(255,255,255,.018);stroke-width:28;
  transform-origin:86px 86px;transform:rotate(-90deg);
  transition:stroke-dashoffset 1.25s var(--eS);}
.RGW{fill:none;stroke:rgba(255,255,255,.042);stroke-width:8;stroke-linecap:round;
  transform-origin:86px 86px;transform:rotate(-90deg);
  transition:stroke-dashoffset 1.12s var(--eS);}
.RGH{fill:none;stroke:rgba(255,255,255,.07);stroke-width:5.5;stroke-linecap:round;
  transform-origin:86px 86px;transform:rotate(-90deg);
  transition:stroke-dashoffset 1.06s var(--eS);}
.RAR{fill:none;stroke:var(--i0);stroke-width:5;stroke-linecap:round;
  transform-origin:86px 86px;transform:rotate(-90deg);
  transition:stroke-dashoffset 1.0s var(--eS);
  filter:drop-shadow(0 0 5px rgba(255,255,255,.58))
         drop-shadow(0 0 18px rgba(255,255,255,.24))
         drop-shadow(0 0 40px rgba(255,255,255,.1))
         drop-shadow(0 0 80px rgba(255,255,255,.04));}

.RTIP{position:absolute;width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 32% 32%,#fff,rgba(255,255,255,.75));
  transform:translate(-50%,-50%) scale(0);
  box-shadow:0 0 16px rgba(255,255,255,.7),0 0 36px rgba(255,255,255,.3),0 0 72px rgba(255,255,255,.12);
  pointer-events:none;
  transition:transform .6s var(--eBo),opacity .48s var(--eS),box-shadow .6s var(--eS);}
.RTIP.TON{transform:translate(-50%,-50%) scale(1);opacity:1;}
.RTIP.TOF{transform:translate(-50%,-50%) scale(0);opacity:0;}

.RI{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:3;}
.RTR{display:flex;align-items:baseline;font-variant-numeric:tabular-nums;}

.DS{display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--srf);font-size:50px;line-height:1;color:var(--i0);
  letter-spacing:-.03em;min-width:.57ch;overflow:hidden;position:relative;height:1.12em;}

<script>
/* ═══════════════════════════════════════════════════════════════════
   CHRONO · ZENITH ENGINE — Android Enhanced Edition
   Fixes: null guards · orientation detection · Android WebView compat
   Added: Web Audio sound engine · enhanced done effects · haptics
═══════════════════════════════════════════════════════════════════ */

// ═══════════════════════════════════════════════════════════════
// WEB AUDIO SOUND ENGINE
// All sounds synthesized — no external files needed
// ═══════════════════════════════════════════════════════════════
let AC = null;

function getAC(){
  if(!AC){
    try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  // Resume if suspended (Android/iOS require user gesture)
  if(AC && AC.state==='suspended'){ AC.resume().catch(()=>{}); }
  return AC;
}

// Unlock audio on first touch (Android requirement)
function unlockAudio(){
  const ac = getAC();
  if(!ac) return;
  const buf = ac.createBuffer(1,1,22050);
  const src = ac.createBufferSource();
  src.buffer = buf; src.connect(ac.destination); src.start(0);
  document.removeEventListener('touchstart', unlockAudio);
  document.removeEventListener('click', unlockAudio);
}
document.addEventListener('touchstart', unlockAudio, {once:true});
document.addEventListener('click', unlockAudio, {once:true});

// Soft tick — sine blip, very subtle
function sndTick(){
  const ac = getAC(); if(!ac) return;
  try{
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type='sine'; osc.frequency.setValueAtTime(880,ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(660,ac.currentTime+.045);
    g.gain.setValueAtTime(.022,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.048);
    osc.start(ac.currentTime); osc.stop(ac.currentTime+.05);
  }catch(e){}
}

// Play button click — soft whoosh
function sndPlay(){
  const ac = getAC(); if(!ac) return;
  try{
    const buf=ac.createBuffer(1,ac.sampleRate*.12,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++){d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5)*0.18;}
    const src=ac.createBufferSource(), g=ac.createGain();
    const filt=ac.createBiquadFilter();
    filt.type='bandpass'; filt.frequency.value=1200; filt.Q.value=1.5;
    src.buffer=buf; src.connect(filt); filt.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(.7,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.12);
    src.start();
  }catch(e){}
}

// Pause — lower pitch whoosh
function sndPause(){
  const ac = getAC(); if(!ac) return;
  try{
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type='sine'; osc.frequency.setValueAtTime(440,ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(220,ac.currentTime+.18);
    g.gain.setValueAtTime(.04,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.18);
    osc.start(ac.currentTime); osc.stop(ac.currentTime+.2);
  }catch(e){}
}

// Reset — subtle downward sweep
function sndReset(){
  const ac = getAC(); if(!ac) return;
  try{
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type='triangle'; osc.frequency.setValueAtTime(330,ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(165,ac.currentTime+.22);
    g.gain.setValueAtTime(.035,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.22);
    osc.start(ac.currentTime); osc.stop(ac.currentTime+.24);
  }catch(e){}
}

// Phase switch — clean blip
function sndPhase(){
  const ac = getAC(); if(!ac) return;
  try{
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type='sine'; osc.frequency.setValueAtTime(660,ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880,ac.currentTime+.09);
    g.gain.setValueAtTime(.03,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.1);
    osc.start(ac.currentTime); osc.stop(ac.currentTime+.11);
  }catch(e){}
}

// Skip — quick stutter
function sndSkip(){
  const ac = getAC(); if(!ac) return;
  try{
    [0,.06].forEach((t,i)=>{
      const osc=ac.createOscillator(), g=ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type='square'; osc.frequency.value=i===0?440:660;
      g.gain.setValueAtTime(.025,ac.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+t+.055);
      osc.start(ac.currentTime+t); osc.stop(ac.currentTime+t+.06);
    });
  }catch(e){}
}

// Done — triumphant 3-note chime
function sndDone(){
  const ac = getAC(); if(!ac) return;
  try{
    [[0,523.25],[.15,659.25],[.32,783.99]].forEach(([dt,freq])=>{
      const osc=ac.createOscillator(), g=ac.createGain();
      const rev=ac.createConvolver();
      // Simple reverb-like decay
      osc.connect(g); g.connect(ac.destination);
      osc.type='sine'; osc.frequency.value=freq;
      const t=ac.currentTime+dt;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.07,t+.012);
      g.gain.exponentialRampToValueAtTime(.0001,t+1.1);
      osc.start(t); osc.stop(t+1.2);
      // Harmonic overtone
      const osc2=ac.createOscillator(), g2=ac.createGain();
      osc2.connect(g2); g2.connect(ac.destination);
      osc2.type='sine'; osc2.frequency.value=freq*2;
      g2.gain.setValueAtTime(0,t);
      g2.gain.linearRampToValueAtTime(.022,t+.01);
      g2.gain.exponentialRampToValueAtTime(.0001,t+.6);
      osc2.start(t); osc2.stop(t+.65);
    });
  }catch(e){}
}

// Minute tick — very soft high sine
function sndMinTick(){
  const ac = getAC(); if(!ac) return;
  try{
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type='sine'; osc.frequency.setValueAtTime(1100,ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880,ac.currentTime+.065);
    g.gain.setValueAtTime(.018,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.07);
    osc.start(ac.currentTime); osc.stop(ac.currentTime+.08);
  }catch(e){}
}

// Haptic feedback (Android WebView / Vibration API)
function haptic(pattern){
  try{ if(navigator.vibrate) navigator.vibrate(pattern||[8]); }catch(e){}
}

const P={
  d0:'#000',d1:'#030303',d2:'#050505',d3:'#080808',
  d4:'#0d0d0d',d5:'#131313',d6:'#1a1a1a',d7:'#232323',d8:'#303030',
  b0:'#080808',b1:'#141414',b2:'#202020',b3:'#2e2e2e',
  i0:'#eeeeee',i1:'#a5a5a5',i2:'#555555',i3:'#2c2c2c',
};

const S={
  clk:{h12:12,h24:0,min:0,sec:0,ms:0,isAm:true,
       secF:0,minF:0,hrF:0,secDeg:0,minDeg:0,hrDeg:0},
  fi:0,
  tm:{phase:'FOCUS',run:'IDLE',total:1500,remain:1500,done:0},
  ls:false,tick:null,
  progA:0,progT:0,bv:0,bd:1,
  prevLS:{d0:'2',d1:'5',d2:'0',d3:'0'},

};

// ── Utils ──────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const $$=(s,fn)=>document.querySelectorAll(s).forEach(fn);
const pad=n=>String(n).padStart(2,'0');
const set=(id,v)=>{const e=$(id);if(e)e.textContent=v};
const tog=(el,c,on)=>{const e=typeof el==='string'?$(el):el;if(e)e.classList.toggle(c,on)};
const flash=(id,cls)=>{const e=$(id);if(!e)return;e.classList.remove(cls);void e.offsetWidth;e.classList.add(cls);};

// ── Clock ──────────────────────────────────────────────────────
function tickClk(){
  const n=new Date(),h24=n.getHours(),h12=h24%12||12;
  const min=n.getMinutes(),sec=n.getSeconds(),ms=n.getMilliseconds();
  const sF=(sec+ms/1e3)/60,mF=(min+sF)/60,hF=((h12%12)+mF)/12;
  // Minute tick sound
  if(S.tm.run==='RUNNING' && min !== S.prevMin && S.prevMin !== -1){
    sndMinTick();
  }
  S.prevMin = min;
  S.clk={h12,h24,min,sec,ms,isAm:h24<12,secF:sF,minF:mF,hrF:hF,
    secDeg:sF*360,minDeg:mF*360,hrDeg:hF*360};
}

// ── Timer ──────────────────────────────────────────────────────
const prog=()=>S.tm.total?1-S.tm.remain/S.tm.total:0;

function setPhase(ph){
  const prev=S.tm.phase; stopTick();
  S.tm={...S.tm,phase:ph,run:'IDLE',total:PH[ph].s,remain:PH[ph].s};
  if(prev!==ph){
    sndPhase();
    haptic([6,30,6]);
    flash('RAR','PFL');flash('LPN','SW');flash('PTAG','PF');
    const tc=$('TC');if(tc){tc.classList.remove('SWEEP');void tc.offsetWidth;tc.classList.add('SWEEP');}
  }
  syncUI();
}
function toggleTm(){
  if(S.tm.run==='RUNNING') pause();
  else if(S.tm.run==='DONE') reset();
  else play();
}
function play(){
  S.tm.run='RUNNING';
  $('TSH')?.classList.add('RUN');
  sndPlay();
  haptic([10]);
  S.tick=setInterval(()=>{
    if(S.tm.remain<=0){
      clearInterval(S.tick);
      if(S.tm.phase==='FOCUS') S.tm.done++;
      S.tm.run='DONE';
      $('TSH')?.classList.remove('RUN');
      syncUI(); flashDone(); sndDone(); haptic([30,50,30,50,60]);
      return;
    }
    S.tm.remain--;
    syncUI();
  },1000);
  syncUI();
}
function pause(){
  clearInterval(S.tick);
  S.tm.run='PAUSED';
  $('TSH')?.classList.remove('RUN');
  sndPause();
  haptic([8]);
  syncUI();
}
function stopTick(){clearInterval(S.tick);S.tick=null;}
function reset(){
  stopTick();
  $('TSH')?.classList.remove('RUN');
  S.tm.remain=S.tm.total=PH[S.tm.phase].s;
  S.tm.run='IDLE';
  sndReset();
  haptic([5,20,5]);
  syncUI();
}
function skip(){
  const was=S.tm.phase==='FOCUS';if(was)S.tm.done++;
  const nxt=was?(S.tm.done%4===0?'LONG':'REST'):'FOCUS';
  stopTick();$('TSH')?.classList.remove('RUN');
  S.tm={...S.tm,phase:nxt,run:'IDLE',total:PH[nxt].s,remain:PH[nxt].s};
  sndSkip(); haptic([5,15,10]);
  syncUI();
}
function flashDone(){
  // Ring flash
  [$('RAR'),$('LBW')].forEach(el=>{
    if(!el)return;el.classList.remove('DFL');void el.offsetWidth;el.classList.add('DFL');
    el.addEventListener('animationend',()=>el.classList.remove('DFL'),{once:true});
  });
  // Full screen overlay glow
  const ov=$('DONE_OVL');
  if(ov){ov.classList.add('SHOW');setTimeout(()=>ov.classList.remove('SHOW'),2200);}
  // Pulse rings
  for(let i=0;i<3;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='PRING_EL';
      const sz=80+i*40;
      el.style.cssText=`width:${sz}px;height:${sz}px;left:50%;top:50%;margin-left:${-sz/2}px;margin-top:${-sz/2}px;`;
      document.body.appendChild(el);
      el.addEventListener('animationend',()=>el.remove(),{once:true});
    },i*180);
  }
}

// ── syncUI ─────────────────────────────────────────────────────
const CIRC=2*Math.PI*71;
const _sv={},_dv={};

function syncUI(){
  const t=S.tm,p=prog(),run=t.run==='RUNNING';
  const mm=pad(~~(t.remain/60)),ss=pad(t.remain%60);
  S.progT=p;

  // 4-layer arc
  const rha=$('RHA'),rgw=$('RGW'),rgh=$('RGH'),rar=$('RAR');
  if(rha)rha.style.strokeDashoffset=CIRC*(1-p*.72);
  if(rgw)rgw.style.strokeDashoffset=CIRC*(1-p*.88);
  if(rgh)rgh.style.strokeDashoffset=CIRC*(1-p*.96);
  if(rar)rar.style.strokeDashoffset=CIRC*(1-p);

  // Tip jewel
  const tip=$('RTIP');
  if(tip){
    if(p>0.008){
      const ang=(-90+p*360)*Math.PI/180;
      const tx=86+71*Math.cos(ang),ty=86+71*Math.sin(ang);
      const svg=document.querySelector('.RSV');
      if(svg){
        const rb=svg.getBoundingClientRect();
        const rz=$('RZ');
        const rzb=rz?rz.getBoundingClientRect():rb;
        tip.style.left=(rb.left-rzb.left+tx*(rb.width/172))+'px';
        tip.style.top=(rb.top-rzb.top+ty*(rb.height/172))+'px';
      }
      tip.classList.remove('TOF');tip.classList.add('TON');
    }else{tip.classList.remove('TON');tip.classList.add('TOF');}
  }

  animSlots(mm,ss);
  tog('CLN','BL',!run);

  // Button icon morph
  const ico=run?'⏸':(t.run==='DONE'?'↺':'▶');
  ['PPLY','LPLY'].forEach(id=>{
    const el=$(id);if(!el)return;
    const ic=el.querySelector('.BI');
    if(ic&&ic.textContent!==ico){
      ic.style.transition='transform .2s var(--eIn),opacity .16s';
      ic.style.transform='scale(.42) rotate(18deg)';ic.style.opacity='0';
      setTimeout(()=>{
        ic.textContent=ico;
        ic.style.transition='transform .42s var(--eBk),opacity .28s';
        ic.style.transform='';ic.style.opacity='';
      },165);
    }
    el.classList.toggle('PL',run);
  });

  set('PTAG',PH[t.phase].label);
  moveSlider($('PBAR'),t.phase);
  $$('#PBAR .PHB',b=>b.classList.toggle('PON',b.dataset.ph===t.phase));

  // Session pips
  $$('#SESS .SP',(d,i)=>{
    const was=d.classList.contains('SON'),is=i<t.done%4;
    d.classList.toggle('SON',is);
    if(!was&&is){d.classList.remove('POP');void d.offsetWidth;d.classList.add('POP');}
  });

  animStat('PDON',`${t.done} session${t.done!==1?'s':''}`);
  animStat('PTOT',`${t.done*25} min focused`);

  // Landscape sync
  const lpf=$('LPF');if(lpf)lpf.style.width=`${p*100}%`;
  const lpct=$('LPCT');if(lpct)lpct.textContent=`${Math.round(p*100)}%`;
  set('LPN',PH[t.phase].label);
  $$('#LCHP .LC',b=>b.classList.toggle('CON',b.dataset.ph===t.phase));
  $$('#LSES .LDT',(d,i)=>d.classList.toggle('SON',i<t.done%4));
  set('LMET',`${t.done} session${t.done!==1?'s':''} · ${t.done*25} min focused`);
  const lbw=$('LBW');if(lbw)lbw.classList.toggle('BR',run);
  animLsDigits(mm,ss);
}

function animStat(id,val){
  if(_sv[id]===val)return;_sv[id]=val;
  const el=$(id);if(!el)return;
  el.textContent=val;el.classList.remove('PP');void el.offsetWidth;el.classList.add('PP');
}

function moveSlider(bar,ph){
  if(!bar)return;
  const btns=[...bar.querySelectorAll('.PHB')];
  const i=btns.findIndex(b=>b.dataset.ph===ph);
  const sl=bar.querySelector('.PSL');
  if(!sl||i<0)return;
  const bw=(bar.offsetWidth-6)/btns.length;
  sl.style.left=`${3+i*bw}px`;sl.style.width=`${bw}px`;
}

// ── Slot digit animation ────────────────────────────────────────
function animSlots(mm,ss){
  const chars=[mm[0],mm[1],ss[0],ss[1]],ids=['D0','D1','D2','D3'];
  chars.forEach((ch,i)=>{
    if(_dv[ids[i]]===ch)return;
    const prev=_dv[ids[i]]||'0';
    const goUp=ch==='0'?prev==='9':parseInt(ch)>parseInt(prev);
    _dv[ids[i]]=ch;
    const slot=$(ids[i]);if(!slot)return;
    const cur=slot.querySelector('.DC');if(!cur)return;
    const nxt=document.createElement('div');
    nxt.className='DN '+(goUp?'IU':'ID');
    nxt.textContent=ch;slot.appendChild(nxt);
    cur.classList.add(goUp?'OU':'OD');
    // Soft tick on digit change
    if(ids[i]==='D3') sndTick();
    setTimeout(()=>{cur.remove();nxt.className='DC';},360);
  });
}

function animLsDigits(mm,ss){
  const now={d0:mm[0],d1:mm[1],d2:ss[0],d3:ss[1]};
  Object.entries(now).forEach(([k,ch])=>{
    if(ch===S.prevLS[k])return;
    const el=$('L'+k.toUpperCase());
    if(el)lsSlide(el,ch,parseInt(ch)>parseInt(S.prevLS[k]));
  });
  S.prevLS={...now};
}
function lsSlide(el,ch,up){
  const old=el.querySelector('.DSP.CUR');if(!old)return;
  const n=document.createElement('span');
  n.className='DSP '+(up?'IU':'ID');
  n.textContent=ch;el.appendChild(n);
  old.classList.remove('CUR');old.classList.add(up?'OU':'OD');
  void n.offsetWidth;n.classList.remove('IU','ID');n.classList.add('CUR');
  setTimeout(()=>old.remove(),540);
}

// CONSTELLATION CANVAS
// ═══════════════════════════════════════════════════════════════
const stars=[];
function initStars(){
  const c=$('CNS');if(!c)return;
  c.width=window.innerWidth;c.height=window.innerHeight;
  stars.length=0;
  const n=Math.min(120,Math.floor(c.width*c.height/8000));
  for(let i=0;i<n;i++)stars.push({
    x:Math.random()*c.width,y:Math.random()*c.height,
    r:Math.random()*.9+.15,
    vx:(Math.random()-.5)*.018,vy:(Math.random()-.5)*.018,
    alpha:Math.random()*.55+.08,
    twinkleSpeed:Math.random()*.6+.2,twinklePhase:Math.random()*Math.PI*2,
  });
}
function drawStars(ts){
  const c=$('CNS');if(!c||!stars.length)return;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  stars.forEach(s=>{
    s.x+=s.vx;s.y+=s.vy;
    if(s.x<0)s.x=c.width;if(s.x>c.width)s.x=0;
    if(s.y<0)s.y=c.height;if(s.y>c.height)s.y=0;
    const tw=s.alpha*(0.55+0.45*Math.sin(ts*s.twinkleSpeed*.001+s.twinklePhase));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${tw})`;ctx.fill();
  });
  // Draw subtle constellation lines between nearby stars
  if(ts%4<2){ // Only draw every other frame for perf
    ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=.4;
    for(let i=0;i<stars.length;i++){
      for(let j=i+1;j<stars.length;j++){
        const dx=stars[i].x-stars[j].x,dy=stars[i].y-stars[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<80){
          ctx.globalAlpha=(1-d/80)*0.06;
          ctx.beginPath();ctx.moveTo(stars[i].x,stars[i].y);ctx.lineTo(stars[j].x,stars[j].y);ctx.stroke();
        }
      }
    }
    ctx.globalAlpha=1;
  }
}

// ═══════════════════════════════════════════════════════════════
// RING AURA CANVAS
// ═══════════════════════════════════════════════════════════════
function drawRingAura(p,bv,run){
  const c=$('RC');if(!c)return;
  const rz=$('RZ');if(!rz)return;
  const rr=rz.getBoundingClientRect();
  if(c.width!==Math.round(rr.width)||c.height!==Math.round(rr.height)){
    c.width=Math.round(rr.width);c.height=Math.round(rr.height);
  }
  const W=c.width,H=c.height,ctx=c.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(p<.005)return;
  const scl=W/172,cx=86*scl,cy=86*scl,R=71*scl;
  const ang=(-Math.PI/2)+p*Math.PI*2;
  const tx=cx+R*Math.cos(ang),ty=cy+R*Math.sin(ang);
  const g=ctx.createRadialGradient(tx,ty,0,tx,ty,R*.35+bv*R*.08);
  g.addColorStop(0,`rgba(255,255,255,${.08+bv*.05})`);
  g.addColorStop(.4,`rgba(255,255,255,${.025+bv*.015})`);
  g.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(tx,ty,R*.35+bv*R*.08,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  const g2=ctx.createRadialGradient(tx,ty,0,tx,ty,R*.1+bv*R*.04);
  g2.addColorStop(0,`rgba(255,255,255,${.32+bv*.18})`);g2.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(tx,ty,R*.1+bv*R*.04,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
}

// LANDSCAPE ARC + PARTICLES
// ═══════════════════════════════════════════════════════════════
const PTCL=[];
function spawnP(tx,ty,run){
  const n=run?7:2,spd=run?2:.6;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,v=(Math.random()*.8+.18)*spd;
    PTCL.push({x:tx,y:ty,vx:Math.cos(a)*v,vy:Math.sin(a)*v,
      life:1,decay:.010+Math.random()*.019,r:Math.random()*2.5+.3,
      trail:[],mxT:run?10:5});
  }
}
function resizeLV(){const c=$('LVB');if(c){c.width=window.innerWidth;c.height=window.innerHeight;}}

function drawLV(pA,bv,run){
  const c=$('LVB');if(!c)return;
  const W=c.width,H=c.height,ctx=c.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const cx=W*.25,cy=H*.5,R=Math.min(W,H)*.76;
  const sa=-Math.PI/2,ea=sa+pA*Math.PI*2;

  [[.98,.6],[.92,.48],[.86,.36]].forEach(([f,a])=>{
    ctx.beginPath();ctx.arc(cx,cy,R*f,0,Math.PI*2);
    ctx.strokeStyle=`rgba(10,10,10,${a})`;ctx.lineWidth=.42;ctx.stroke();
  });

  if(pA>.003){
    ctx.save();ctx.globalAlpha=.08+pA*.065;
    ctx.beginPath();ctx.arc(cx,cy,R,sa,ea);
    ctx.strokeStyle='rgba(28,28,28,.7)';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();
    ctx.restore();
    ctx.save();ctx.globalAlpha=.82;
    ctx.beginPath();ctx.arc(cx,cy,R,sa,ea);
    ctx.strokeStyle=`rgba(72,72,72,${.3+pA*.2})`;ctx.lineWidth=1.3;ctx.lineCap='round';
    ctx.shadowColor='rgba(210,210,210,.1)';ctx.shadowBlur=8;ctx.stroke();ctx.restore();
  }

  if(pA>.012){
    const tx=cx+R*Math.cos(ea),ty=cy+R*Math.sin(ea);
    if(run&&Math.random()<.48)spawnP(tx,ty,true);
    if(!run&&pA>.08&&Math.random()<.06)spawnP(tx,ty,false);
    for(let i=PTCL.length-1;i>=0;i--){
      const p=PTCL[i];
      p.trail.push({x:p.x,y:p.y});
      if(p.trail.length>p.mxT)p.trail.shift();
      p.x+=p.vx;p.y+=p.vy;p.vy+=.02;p.vx*=.978;
      p.life-=p.decay;
      if(p.life<=0){PTCL.splice(i,1);continue;}
      if(p.trail.length>1){
        for(let j=1;j<p.trail.length;j++){
          const a=(j/p.trail.length)*p.life*.24;
          const w=p.r*(j/p.trail.length)*.55;
          ctx.beginPath();ctx.moveTo(p.trail[j-1].x,p.trail[j-1].y);ctx.lineTo(p.trail[j].x,p.trail[j].y);
          ctx.strokeStyle=`rgba(255,255,255,${a})`;ctx.lineWidth=w;ctx.stroke();
        }
      }
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life*.9,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${p.life*.28})`;ctx.fill();
    }
    [[80+bv*22,.05+bv*.035],[28+bv*12,.18+bv*.1],[9+bv*5,.5+bv*.22]].forEach(([r,a])=>{
      const g=ctx.createRadialGradient(tx,ty,0,tx,ty,r);
      g.addColorStop(0,`rgba(255,255,255,${a})`);g.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(tx,ty,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    });
    ctx.beginPath();ctx.arc(tx,ty,3+bv,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${.96+bv*.04})`;ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════
// CLOCK FACE DRAWERS
// ═══════════════════════════════════════════════════════════════
const SZ=300;
const p2=n=>String(n).padStart(2,'0');
function pol(cx,cy,r,deg){const a=(deg-90)*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}
function aD(ctx,cx,cy,r,s0,sw,col,lw,cap='round'){
  if(Math.abs(sw)<.06)return;const a0=(s0-90)*Math.PI/180;
  ctx.beginPath();ctx.arc(cx,cy,r,a0,a0+sw*Math.PI/180);
  ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.lineCap=cap;ctx.stroke();
}
function hand(ctx,cx,cy,deg,len,tail,w,col,glow=false){
  const[tx,ty]=pol(cx,cy,len,deg),[bx,by]=pol(cx,cy,-tail,deg);
  if(glow){ctx.save();ctx.shadowColor=col;ctx.shadowBlur=16;}
  ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(tx,ty);
  ctx.strokeStyle=col;ctx.lineWidth=w;ctx.lineCap='round';ctx.stroke();
  if(glow)ctx.restore();
}
function circ(ctx,cx,cy,R){ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);}

// 1─ORBIT
function drawOrbit(ctx,t){
  const cx=SZ/2,cy=SZ/2,R=SZ/2*.9,sw=R*.044;
  ctx.clearRect(0,0,SZ,SZ);circ(ctx,cx,cy,R);ctx.fillStyle=P.d0;ctx.fill();
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  bg.addColorStop(0,'rgba(255,255,255,.026)');bg.addColorStop(.45,'rgba(255,255,255,.008)');bg.addColorStop(1,'rgba(0,0,0,.32)');
  circ(ctx,cx,cy,R);ctx.fillStyle=bg;ctx.fill();
  [[t.hrF,R*.42,.97,sw],[t.minF,R*.63,.6,sw],[t.secF,R*.84,.28,sw*.8]].forEach(([f,r,a,w])=>{
    circ(ctx,cx,cy,r);ctx.strokeStyle='rgba(255,255,255,.02)';ctx.lineWidth=w;ctx.stroke();

// 3─SIGIL
function drawSigil(ctx,t){

// 4─TERMINAL
function rr(ctx,x,y,w,h,r,f){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();

function drawTerminal(ctx,t){
  const W=SZ,H=SZ,cx=W/2;ctx.clearRect(0,0,W,H);ctx.fillStyle=P.d3;rr(ctx,0,0,W,H,18,true);
  for(let y=0;y<H;y+=3){ctx.fillStyle='rgba(0,0,0,.04)';ctx.fillRect(0,y,W,1);}
  const vig=ctx.createRadialGradient(cx,H/2,H*.25,cx,H/2,H*.75);vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(0,0,0,.44)');ctx.fillStyle=vig;rr(ctx,0,0,W,H,18,true);

  ctx.fillStyle=P.i3;ctx.textAlign='center';ctx.textBaseline='top';ctx.font=`600 ${W*.026}px 'Syne',sans-serif`;ctx.fillText('CHRONO // OS',cx,H*.075);
  ctx.fillStyle=P.i0;ctx.font=`400 ${W*.275}px 'Instrument Serif',serif`;ctx.fillText(p2(t.h12),cx,H*.165);
  ctx.fillStyle=`rgba(238,238,238,${t.sec%2===0?.8:.08})`;ctx.font=`400 ${W*.135}px 'Instrument Serif',serif`;ctx.fillText(':',cx,H*.46);
  ctx.fillStyle=P.i0;ctx.font=`400 ${W*.275}px 'Instrument Serif',serif`;ctx.fillText(p2(t.min),cx,H*.535);
  const bP=W*.1,bY=H*.88,bH=1.3;
  ctx.beginPath();ctx.moveTo(bP,bY);ctx.lineTo(W-bP,bY);ctx.strokeStyle=P.b1;ctx.lineWidth=bH;ctx.lineCap='round';ctx.stroke();
  if(t.secF>.001){ctx.save();ctx.shadowColor='rgba(150,150,150,.2)';ctx.shadowBlur=4;ctx.beginPath();ctx.moveTo(bP,bY);ctx.lineTo(bP+(W-bP*2)*t.secF,bY);ctx.strokeStyle=P.i1;ctx.lineWidth=bH;ctx.stroke();ctx.restore();}
  if(t.sec%2===0){const cx2=bP+(W-bP*2)*t.secF+1.5;ctx.beginPath();ctx.moveTo(cx2,bY-3.5);ctx.lineTo(cx2,bY+3.5);ctx.strokeStyle=P.i0;ctx.lineWidth=.95;ctx.stroke();}
  ctx.fillStyle=P.i3;ctx.font=`300 ${W*.025}px 'DM Mono',monospace`;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('_SEC '+p2(t.sec),cx,H*.895);
}

// 5─VAPOR
function drawVapor(ctx,t){

// PAGER
// ═══════════════════════════════════════════════════════════════
const DRAWS=[drawOrbit,drawPendulum,drawSigil,drawTerminal,drawVapor,drawNocturne];
const FACES=[
  {t:'Orbit',d:'Three luminous rings in space'},
  {t:'Pendulum',d:'Gravity-swept arc balance'},
  {t:'Sigil',d:'Sacred geometry interlace'},
  {t:'Terminal',d:'CRT phosphor scanlines'},
  {t:'Vapor',d:'Atmospheric pressure field'},
  {t:'Nocturne',d:'Piano-key moon cycle'},
];
const CVS=[];

function buildPager(){
  const belt=$('BELT'),row=$('DROW');
  if(!belt||!row)return;
  FACES.forEach((f,i)=>{
    const card=document.createElement('div');card.className='CC '+(i===0?'CA':'CI');card.id='CC'+i;
    const cv=document.createElement('canvas');cv.width=SZ;cv.height=SZ;
    card.appendChild(cv);belt.appendChild(card);CVS.push(cv);
    const dot=document.createElement('div');dot.className='ID '+(i===0?'DO':'DF');dot.id='DD'+i;row.appendChild(dot);
  });
  const ls=$('LSES');if(ls)for(let i=0;i<4;i++){const d=document.createElement('div');d.className='LDT';ls.appendChild(d);}
}

function cardW(){const e=$('CC0');return e?e.getBoundingClientRect().width+16:0;}
function tOff(i){return -i*cardW();}
function setTrack(v,anim=true){
  const b=$('BELT');if(!b)return;
  b.style.transition=anim?'transform .68s cubic-bezier(.16,1,.3,1)':'none';
  b.style.transform=`translateX(${v}px)`;
}
function pickFace(i){
  const prev=S.fi;S.fi=Math.max(0,Math.min(FACES.length-1,i));
  FACES.forEach((_,j)=>{
    $('CC'+j)?.classList.toggle('CA',j===S.fi);
    $('CC'+j)?.classList.toggle('CI',j!==S.fi);
    $('DD'+j)?.classList.toggle('DO',j===S.fi);
    $('DD'+j)?.classList.toggle('DF',j!==S.fi);
  });
  if(prev!==S.fi){
    animLabel(S.fi,S.fi>prev);
    sndPhase(); // subtle sound on face change
    haptic([4]);
  }
  setTrack(tOff(S.fi));
}
function animLabel(i,right){
  const el=$('FL');if(!el)return;
  el.classList.remove('FLS','FLU','FLD');el.classList.add(right?'FLU':'FLD');
  setTimeout(()=>{
    const ft=$('FTIT'),fs=$('FSUB');
    if(ft)ft.textContent=FACES[i].t;
    if(fs)fs.textContent=FACES[i].d;
    el.classList.remove('FLU','FLD');el.classList.add('FLS');
  },190);
}

// ── Drag / Swipe ────────────────────────────────────────────────
let DR={on:false,sx:0,ox:0,moved:false};
function setupDrag(){
  const belt=$('BELT');if(!belt)return;
  const ss=x=>{DR={on:true,sx:x,ox:tOff(S.fi),moved:false};belt.style.transition='none';document.body.classList.add('CDR');};
  const sm=x=>{if(!DR.on)return;if(Math.abs(x-DR.sx)>5)DR.moved=true;setTrack(DR.ox+(x-DR.sx),false);};
  const se=x=>{
    if(!DR.on)return;DR.on=false;document.body.classList.remove('CDR');
    const dx=x-DR.sx,w=cardW();let ni=S.fi;
    if(DR.moved&&Math.abs(dx)>w*.14)ni+=dx<0?1:-1;
    pickFace(ni);
  };
  belt.addEventListener('mousedown',e=>ss(e.clientX));
  window.addEventListener('mousemove',e=>sm(e.clientX));
  window.addEventListener('mouseup',e=>se(e.clientX));
  belt.addEventListener('touchstart',e=>ss(e.touches[0].clientX),{passive:true});
  window.addEventListener('touchmove',e=>{if(DR.on){e.preventDefault();sm(e.touches[0].clientX);}},{passive:false});
  window.addEventListener('touchend',e=>se(e.changedTouches[0].clientX));
}

// ── Orientation ─────────────────────────────────────────────────
function checkOri(){
  // Use screen.orientation API if available, fall back to dimensions
  let ls;
  if(screen.orientation){
    ls = screen.orientation.type.startsWith('landscape');
  } else {
    ls = window.innerWidth > window.innerHeight;
  }
  if(ls===S.ls)return;S.ls=ls;
  const pv=$('PV'),lv=$('LV');
  if(!pv||!lv)return;
  if(ls){
    lv.classList.remove('OFF','VX');lv.classList.add('VE');
    pv.classList.remove('VE');pv.classList.add('VX');
    setTimeout(()=>pv.classList.add('OFF'),720);
    resizeLV();
  }else{
    pv.classList.remove('OFF','VX');pv.classList.add('VE');
    lv.classList.remove('VE');lv.classList.add('VX');
    setTimeout(()=>lv.classList.add('OFF'),720);
    setTimeout(()=>setTrack(tOff(S.fi),false),24);
  }
  syncUI();
  setTimeout(()=>moveSlider($('PBAR'),S.tm.phase),34);
}

// ── Spring Cursor (desktop only) ────────────────────────────────
let MX=0,MY=0;
const RINGS=[
  {id:'CR1',x:0,y:0,vx:0,vy:0,stiff:.18,damp:.72},
  {id:'CR2',x:0,y:0,vx:0,vy:0,stiff:.10,damp:.78},
  {id:'CR3',x:0,y:0,vx:0,vy:0,stiff:.055,damp:.82},
  {id:'CR4',x:0,y:0,vx:0,vy:0,stiff:.028,damp:.86},
];

function setupCursor(){
  MX=innerWidth/2; MY=innerHeight/2;
  const dot=$('CD');
  RINGS.forEach(r=>{r.el=$(r.id);r.x=MX;r.y=MY;});
  window.addEventListener('mousemove',e=>{
    MX=e.clientX;MY=e.clientY;
    if(dot){dot.style.left=MX+'px';dot.style.top=MY+'px';}
  });
  document.addEventListener('mouseover',e=>{
    document.body.classList.toggle('COV',!!e.target.closest('.CB,.PHB,.LC,.CC,.BG,.LP,.STP'));
  });
  (function springTick(){
    RINGS.forEach(r=>{
      if(!r.el)return;
      r.vx+=(MX-r.x)*r.stiff;r.vy+=(MY-r.y)*r.stiff;
      r.vx*=r.damp;r.vy*=r.damp;
      r.x+=r.vx;r.y+=r.vy;
      r.el.style.left=r.x.toFixed(2)+'px';r.el.style.top=r.y.toFixed(2)+'px';
    });
    requestAnimationFrame(springTick);
  })();
}

// Ripple
function ripple(btn,e){
  if(!btn)return;
  const r=btn.getBoundingClientRect(),sz=Math.max(r.width,r.height)*3.2;
  const el=document.createElement('span');el.className='RPL';
  el.style.cssText=`width:${sz}px;height:${sz}px;left:${((e&&e.clientX)||r.left+r.width/2)-r.left-sz/2}px;top:${((e&&e.clientY)||r.top+r.height/2)-r.top-sz/2}px`;
  btn.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

// Touch feedback flash
function touchFlash(x,y){
  const fb=$('TFB');if(!fb)return;
  fb.style.setProperty('--tx',(x/window.innerWidth*100)+'%');
  fb.style.setProperty('--ty',(y/window.innerHeight*100)+'%');
  fb.classList.add('ON');
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>fb.classList.remove('ON'));
  });
}

// ── Bindings ─────────────────────────────────────────────────────
function bind(){
  const B=(id,fn)=>{
    const el=$(id);if(!el)return;
    el.addEventListener('click',e=>{ripple(el,e);fn();});
    // Touch flash on touchstart for instant visual feedback
    el.addEventListener('touchstart',e=>{
      const t=e.touches[0];
      touchFlash(t.clientX,t.clientY);
    },{passive:true});
  };
  B('PRST',reset);B('PPLY',toggleTm);B('PSKP',skip);
  B('LRST',reset);B('LPLY',toggleTm);B('LSKP',skip);
  $$('#PBAR .PHB',b=>{
    b.addEventListener('click',e=>{ripple(b,e);setPhase(b.dataset.ph);});
    b.addEventListener('touchstart',e=>{touchFlash(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  });
  $$('#LCHP .LC',b=>{
    b.addEventListener('click',e=>{ripple(b,e);setPhase(b.dataset.ph);});
    b.addEventListener('touchstart',e=>{touchFlash(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  });
  window.addEventListener('resize',()=>{checkOri();if(S.ls)resizeLV();initStars();});
  window.addEventListener('orientationchange',()=>setTimeout(checkOri,120));
  if(screen.orientation){
    screen.orientation.addEventListener('change',()=>setTimeout(checkOri,120));
  }
  // Android back button via History API
  history.pushState(null,'',window.location.href);
  window.addEventListener('popstate',()=>{
    history.pushState(null,'',window.location.href);
  });
}

// ═══════════════════════════════════════════════════════════════
// MAIN RAF LOOP
// ═══════════════════════════════════════════════════════════════
let prevT=0,BV=0,BD=1;

function loop(ts){
  const dt=Math.min(ts-prevT,50);prevT=ts;
  tickClk();
  const t=S.clk;

  const lp=$('LT');if(lp)lp.textContent=`${p2(t.h12)}:${p2(t.min)} ${t.isAm?'AM':'PM'}`;

  if(S.tm.run==='RUNNING'){
    BV+=BD*dt/3600;if(BV>=1){BV=1;BD=-1;}if(BV<=0){BV=0;BD=1;}
  }else{BV=BV*.92;}

  S.progA+=(S.progT-S.progA)*Math.min(1,dt*.0016);

  drawStars(ts);
  drawRingAura(S.progA,BV,S.tm.run==='RUNNING');

  if(!S.ls){
    if(CVS[S.fi]) DRAWS[S.fi](CVS[S.fi].getContext('2d'),t);
    [S.fi-1,S.fi+1].forEach(ni=>{
      if(ni>=0&&ni<FACES.length&&CVS[ni]&&Math.floor(ts/130)%2===0)
        DRAWS[ni](CVS[ni].getContext('2d'),t);
    });
  }

  if(S.ls) drawLV(S.progA,BV,S.tm.run==='RUNNING');

  requestAnimationFrame(loop);
}

// ── Boot ────────────────────────────────────────────────────────
(function boot(){
  buildPager();
  bind();
  setupCursor();
  initStars();
  checkOri();
  syncUI();
  setTimeout(()=>{
    moveSlider($('PBAR'),S.tm.phase);
    tickClk();
    CVS.forEach((cv,i)=>{
      if(cv) DRAWS[i](cv.getContext('2d'),S.clk);
    });
    setTrack(tOff(0),false);
  },30);
  requestAnimationFrame(loop);
})();
</script>
